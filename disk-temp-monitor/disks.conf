# Disk Temperature Monitor Configuration
# Format: device_path,friendly_name,grep_pattern
#
# Common grep patterns:
#   - Temperature_Celsius (Seagate, WD)
#   - Temp (Samsung SSD)
#   - Current Drive Temperature (Intel SSD)
#
# Find your pattern with: sudo smartctl -a /dev/sdX | grep -i temp

# Example configurations (uncomment and edit for your system):

# Two disks example:
/dev/sdf,Avicenna,Temperature
/dev/sdh,Zimrilim,Temp

# Single SSD + Single HDD example:
# /dev/sda,NVMe_SSD,Temp
# /dev/sdb,Backup_HDD,Temperature_Celsius

# RAID array example:
# /dev/sda,RAID_Disk1,Temperature_Celsius
# /dev/sdb,RAID_Disk2,Temperature_Celsius
# /dev/sdc,RAID_Disk3,Temperature_Celsius
# /dev/sdd,RAID_Disk4,Temperature_Celsius
